<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>KAMARU.ME</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
        <style>
            body {
                font-family: "Audiowide", sans-serif;
            }
        </style>
    </head>

    <body class="m-0 p-0 text-white">
        <div class="w-full h-screen p-3 md:p-10">
            <div class="relative bg-[#1c1c1c] rounded-3xl h-full border-2 border-gray-700 overflow-hidden">
                <h1 class="m-10 text-3xl">K_</h1>

                <!-- Text Left & Right -->
                <div class="md:absolute top-1/2 transform -translate-y-1/2 w-full px-10 md:flex justify-between items-center z-10">

                    <!-- Left Text -->
                    <div class="md:text-left mt-48 sm:mt-0 text-center md:text-left">
                        <h2 class="text-4xl md:text-5xl font-bold">I'm <br> Kamarudheen</h2>
                    </div>

                    <!-- Right Text -->
                    <div class="md:text-right max-w-sm mt-10 md:mt-0 text-center md:text-right">
                        <p class="text-lg">Web Developer & Tech Enthusiast</p>
                        <p class="text-lg">Crafting the future, one line of code at a time.</p>
                    </div>

                </div>

                <!-- Image at the bottom -->
                <img src="/images/me.png" class="absolute bottom-0 left-1/2 transform -translate-x-1/2 max-w-2xl w-full object-contain" alt="Kamaru" />
            </div>
        </div>
    </body>
</html>
